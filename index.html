<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOELL AI1 - Modern AI Assistant</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Inter & Lucide Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 glass border-b border-zinc-200 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="fas fa-sparkles"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight">JOELL AI1</h1>
        </div>
        <button onclick="clearChat()" class="text-zinc-500 hover:text-red-500 transition-colors">
            <i class="fas fa-trash-alt"></i>
        </button>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 chat-container">
        <div class="max-w-3xl mx-auto space-y-6" id="messages">
            <!-- Pesan Awal -->
            <div class="flex gap-4">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white flex-shrink-0">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bg-white border border-zinc-200 p-4 rounded-2xl shadow-sm max-w-[85%]">
                    <p class="text-sm text-zinc-800">Halo! Saya JOELL AI1. Ada yang bisa saya bantu hari ini?</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 md:p-8 bg-gradient-to-t from-zinc-50 to-transparent">
        <form id="chat-form" class="max-w-3xl mx-auto relative">
            <input type="text" id="user-input" placeholder="Tanyakan sesuatu pada JOELL AI1..." 
                class="w-full p-4 pr-14 bg-white border border-zinc-200 rounded-2xl shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
            <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
        <p class="text-center text-[10px] text-zinc-400 mt-4">JOELL AI1 Powered by Gemini AI</p>
    </footer>

    <!-- Script Gemini AI -->
    <script type="module">
        import { GoogleGenAI } from "https://esm.sh/@google/genai";

        // GANTI DENGAN API KEY ANDA
        const API_KEY = "AIzaSyCLz0ubP1bMmZf_pEh0kMUrp83EQvFTTZ0"; 
        const genAI = new GoogleGenAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const messagesDiv = document.getElementById('messages');
        const chatContainer = document.getElementById('chat-container');

        let chatHistory = [];

        function addMessage(role, text) {
            const isUser = role === 'user';
            const html = `
                <div class="flex gap-4 ${isUser ? 'flex-row-reverse' : ''}">
                    <div class="w-8 h-8 ${isUser ? 'bg-zinc-200 text-zinc-600' : 'bg-indigo-600 text-white'} rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-${isUser ? 'user' : 'robot'}"></i>
                    </div>
                    <div class="${isUser ? 'bg-indigo-600 text-white shadow-md' : 'bg-white border border-zinc-200 text-zinc-800 shadow-sm'} p-4 rounded-2xl max-w-[85%]">
                        <p class="text-sm">${text}</p>
                    </div>
                </div>
            `;
            messagesDiv.insertAdjacentHTML('beforeend', html);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';

            // Loading state
            const loadingId = 'loading-' + Date.now();
            messagesDiv.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="text-zinc-400 text-xs italic ml-12">JOELL AI1 sedang berpikir...</div>`);

            try {
                const result = await model.generateContent(text);
                const response = await result.response;
                document.getElementById(loadingId).remove();
                addMessage('assistant', response.text());
            } catch (error) {
                document.getElementById(loadingId).innerText = "Terjadi kesalahan. Periksa API Key Anda.";
                console.error(error);
            }
        });

        window.clearChat = () => {
            messagesDiv.innerHTML = `
                <div class="flex gap-4">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white flex-shrink-0">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bg-white border border-zinc-200 p-4 rounded-2xl shadow-sm max-w-[85%]">
                        <p class="text-sm text-zinc-800">Chat telah dihapus. Ada lagi yang bisa saya bantu?</p>
                    </div>
                </div>
            `;
        };
    </script>
</body>
</html>
